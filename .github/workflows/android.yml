# Build the Android APK (native SDL2; see TOOLS.md → Android build) and
# upload it as a workflow artifact — download it from the run page and
# install it directly on a phone (debug builds are debug-keystore signed).
name: android

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "android/**"
      - "src/**"
      - "assets/**"
      - "Makefile"
      - ".github/workflows/android.yml"
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # No gradle wrapper is committed (it would be a binary jar in git), so
      # pin the gradle version here instead.
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      # The pinned SDL release sources fetch_deps.sh downloads (~35 MB); keyed
      # on the script so bumping a version there invalidates the cache.
      - uses: actions/cache@v4
        with:
          path: |
            android/app/jni/SDL2
            android/app/jni/SDL2_image
            android/app/jni/SDL2_mixer
            android/app/jni/SDL2_ttf
          key: sdl-android-${{ hashFiles('android/fetch_deps.sh') }}

      # The runner image ships the Android SDK + NDK; make android generates
      # the asset declarations header, fetches SDL, syncs the APK assets and
      # runs gradle assembleDebug.
      - name: Build APK
        run: make android

      - uses: actions/upload-artifact@v4
        with:
          name: vaniavolpe-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
