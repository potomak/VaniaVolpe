name: Deploy web build to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets us deploy/test from any branch on demand

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Build web target with Emscripten
        # Pinned: "latest" silently changes the compiler under us (emsdk 6.0
        # broke Safari via growable ArrayBuffers). Bump deliberately, and
        # play-test the result in Safari — Chromium-based CI can't catch
        # WebKit-only regressions.
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git ~/emsdk
          ~/emsdk/emsdk install 6.0.2
          ~/emsdk/emsdk activate 6.0.2
          source ~/emsdk/emsdk_env.sh
          make web
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
