name: Test (headless playthrough)

# Gating: builds the headless test target and runs the scripted Gina
# playthrough. The job fails if the game doesn't reach the expected states, so a
# broken playthrough blocks the PR the way a broken web build does.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The test target renders offscreen (SDL's built-in "offscreen" video
      # driver) and uses the dummy audio driver, so no display server or sound
      # card is needed — just the SDL dev libraries. libcaca is not required.
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      # The asset headers under gen/ are committed (so their symbols resolve in
      # editors without a build). Regenerate them from the manifests and fail if
      # the working tree changes — i.e. someone edited a manifest without
      # running `make gen` (ASSETS.md).
      - name: Check committed asset headers are up to date
        run: |
          make gen
          git diff --exit-code -- gen \
            || { echo "gen/ is stale — run 'make gen' and commit."; exit 1; }

      - name: Build the headless test target
        run: make test

      - name: Run the scripted playthrough
        run: ./vaniavolpe_test
