<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Vania Volpe - Lo Scivolo</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; }
  /* Landscape canvas (800x600, 4:3): fit the viewport, keep aspect ratio. */
  #canvas {
    width: 100vw; max-width: 100vw; max-height: 100vh;
    aspect-ratio: 4 / 3; background: #000;
    display: block; touch-action: none; outline: none;
    image-rendering: auto;
  }
  #status {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #eee; font: 16px system-ui, sans-serif; text-align: center;
  }
</style>
</head>
<body>
  <canvas id="canvas" tabindex="-1" oncontextmenu="event.preventDefault()"></canvas>
  <div id="status">Caricamento di Vania Volpe…</div>
  <script>
    var statusEl = document.getElementById('status');
    // Per-build version stamped in by the Makefile (see the web target). Used to
    // cache-bust the wasm/data fetches so a redeploy never pairs a stale cached
    // file with a fresh one under these fixed names (which fails -> black screen).
    var CACHE_BUST = '__CACHE_BUST__';
    // Language for the build: ?lang= overrides the browser language. Passed to
    // the C entry point as --locale=, which maps it to a supported locale
    // ("en-US" -> en_US) and defaults to it_IT.
    var LANG_PREF =
      new URLSearchParams(location.search).get('lang') || navigator.language || '';
    var Module = {
      arguments: LANG_PREF ? ['--locale=' + LANG_PREF] : [],
      canvas: (function () { return document.getElementById('canvas'); })(),
      locateFile: function (path) {
        return /\.(wasm|data)$/.test(path) ? path + '?v=' + CACHE_BUST : path;
      },
      print: function (t) { console.log(t); },
      printErr: function (t) { console.error(t); },
      setStatus: function (t) {
        if (!statusEl) return;
        if (t === '') {
          statusEl.style.display = 'none';
          return;
        }
        statusEl.style.display = '';
        // Emscripten reports the data download as a raw byte counter,
        // "Downloading data... (loaded/total)". Show a percentage instead: it
        // reads the totals Emscripten already computes, so there is no hard-coded
        // size to keep in sync — it updates itself as the assets change.
        var m = t.match(/\((\d+)\/(\d+)\)/);
        if (m && Number(m[2]) > 0) {
          var pct = Math.min(100, Math.round((Number(m[1]) / Number(m[2])) * 100));
          statusEl.textContent = 'Caricamento di Vania Volpe… ' + pct + '%';
        } else {
          statusEl.textContent = 'Caricamento di Vania Volpe…';
        }
      },
      onRuntimeInitialized: function () { Module.setStatus(''); },
    };
    Module.setStatus('Caricamento di Vania Volpe…');

    // iOS Safari audio unlock.
    //
    // When navigator.userActivation exists (iOS Safari 16.4+), SDL2's Web Audio
    // glue resumes the AudioContext from a setInterval timer rather than from the
    // user-gesture handler. iOS only honours AudioContext.resume() when it is
    // called synchronously inside the gesture, so the context stays suspended and
    // there is no sound. Resume it ourselves on the first interaction.
    function unlockAudio() {
      try {
        var SDL2 = window.Module && Module.SDL2;
        if (SDL2 && SDL2.audioContext && SDL2.audioContext.state === 'suspended') {
          SDL2.audioContext.resume();
        }
      } catch (e) {}
    }
    ['touchstart', 'touchend', 'mousedown', 'click', 'keydown'].forEach(function (ev) {
      document.addEventListener(ev, unlockAudio, false);
    });

    // Play audio even when the iPhone ring/silent switch is on (Safari 16.4+);
    // a no-op on browsers without the Audio Session API.
    try {
      if (navigator.audioSession) navigator.audioSession.type = 'playback';
    } catch (e) {}
  </script>
  {{{ SCRIPT }}}
</body>
</html>
